# Understudy local dev stack — mirrors architecture.md §12 deployment diagram.
# Managed-services (InsForge, Redis 8 Cloud, Cosmo Cloud) are run as local placeholders here.
version: "3.9"

services:
  redis:
    image: redis:8
    container_name: understudy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  cosmo-router:
    # Federation gateway — see apps/cosmo-router/ (task #6, architecture.md §7).
    image: ghcr.io/wundergraph/cosmo-router:latest
    container_name: understudy-cosmo-router
    ports:
      - "4000:4000"
      - "5026:5026"   # ConnectRPC server (gRPC / Connect / HTTP+JSON)
      - "8088:8088"   # Prometheus scrape endpoint
    environment:
      - CONFIG_PATH=/etc/cosmo-router/config.yaml
      - DEV_MODE=${COSMO_ROUTER_DEV_MODE:-false}
      - LOG_LEVEL=${COSMO_ROUTER_LOG_LEVEL:-info}
      # Supergraph polling + auth + EDFS — consumed via ${VAR} substitution
      # in config.yaml. Sourced from the root .env file below.
      - REDIS_URL=redis://redis:6379/1
      - EDFS_KAFKA_BROKERS=${EDFS_KAFKA_BROKERS}
      - EDFS_KAFKA_SASL_USERNAME=${EDFS_KAFKA_SASL_USERNAME}
      - EDFS_KAFKA_SASL_PASSWORD=${EDFS_KAFKA_SASL_PASSWORD}
      - EDFS_NATS_URL=${EDFS_NATS_URL}
      - EDFS_NATS_TOKEN=${EDFS_NATS_TOKEN}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - STUDIO_URL=${STUDIO_URL:-https://cosmo.wundergraph.com/studio}
    env_file:
      - .env
    volumes:
      - ./apps/cosmo-router/config.yaml:/etc/cosmo-router/config.yaml:ro
      - ./apps/cosmo-router/supergraph.json:/etc/cosmo-router/supergraph.json:ro
      # Trusted Documents (per-agent .graphql operations) pushed via
      # `wgc operations push` — kept on disk so future tooling can inspect them.
      - ./apps/cosmo-router/operations:/etc/cosmo-router/operations:ro
      # ConnectRPC services (per-agent service.proto + matching .graphql ops)
      # generated by `wgc grpc-service generate` from apps/synthesis-worker/
      # cosmo_writer.py. The router watches this dir and serves each service
      # at http://<host>:5026/<package>.<Service>/<RpcMethod>.
      - ./apps/cosmo-router/services:/etc/cosmo-router/services:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy

  synthesis-api:
    # Placeholder — built from apps/api/ once Dockerfile lands (task #2).
    image: ghcr.io/nihalnihalani/understudy-synthesis-api:dev
    container_name: understudy-synthesis-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - COSMO_ROUTER_URL=http://cosmo-router:4000
      - DEMO_MODE=${DEMO_MODE:-live}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  insforge:
    # Placeholder — InsForge 2.0 Remote OAuth MCP runs as managed SaaS in prod.
    # Local stand-in for development only; see infra/insforge-pool/ for warm-pool config.
    image: postgres:16
    container_name: understudy-insforge-stub
    environment:
      - POSTGRES_PASSWORD=insforge_dev
      - POSTGRES_DB=understudy
    ports:
      - "5432:5432"
