# Cosmo Router configuration — Understudy federation gateway.
# Loaded by ghcr.io/wundergraph/cosmo-router (or `wgc router download-binary`)
# at container start. Architecture: architecture.md §4 (EDFS), §7 (headless
# MCP), §12 (deployment).
#
# Schema: validated against router 0.311.0+ at boot. The complete schema lives
# at https://raw.githubusercontent.com/wundergraph/cosmo/router%400.311.0/router/pkg/config/config.schema.json
#
# Secrets are injected from the environment via ${VAR} substitution — never
# hardcode credentials in this file.

version: "1"

# Public-facing GraphQL endpoint. Mapped to host :4000 in docker-compose.
listen_addr: "0.0.0.0:4000"
graphql_path: "/graphql"

# --- Supergraph ----------------------------------------------------------
# The router polls supergraph.json on disk. Composition runs in the
# register_agent_subgraph.sh flow (wgc router compose -> write file).
# When Cosmo Cloud is reachable, execution_config can be swapped to a
# cloud-polled variant; offline/local dev uses the on-disk file.
execution_config:
  file:
    path: "/etc/cosmo-router/supergraph.json"
    watch: true
    watch_interval: "5s"

# --- Authentication ------------------------------------------------------
# InsForge 2.0 moved to API-key auth; the OAuth/JWKS flow assumed by the
# original Cosmo router config is no longer wired. Auth is temporarily
# disabled on this router so the demo can show federated queries without
# requiring a JWT provider. Re-introduce auth here once the production
# token-issuer is decided (per-agent InsForge API keys, Clerk, Auth0 —
# whichever wins).
authorization:
  require_authentication: false

# --- Health checks (top-level path strings, not nested objects) ----------
health_check_path: "/health"
readiness_check_path: "/health/ready"
liveness_check_path: "/health/live"

# --- CORS ---------------------------------------------------------------
# Frontend (apps/ui) embeds Cosmo Studio + hits /graphql directly from the
# browser during the live demo.
cors:
  allow_origins:
    - "${FRONTEND_ORIGIN}"
    - "${STUDIO_URL}"
  allow_methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allow_headers:
    - "Authorization"
    - "Content-Type"
    - "Apollo-Require-Preflight"
  allow_credentials: true

# --- Observability ------------------------------------------------------
telemetry:
  service_name: "understudy-cosmo-router"
  tracing:
    enabled: true
    sampling_rate: 1.0
  metrics:
    prometheus:
      enabled: true
      listen_addr: "0.0.0.0:8088"
      path: "/metrics"

# --- Router engine tuning ----------------------------------------------
engine:
  enable_single_flight: true
  enable_request_tracing: true
  execution_plan_cache_size: 1024
  websocket_client_poll_timeout: "1s"

# --- ConnectRPC (multi-protocol surface for the federated graph) --------
# Exposes the federated GraphQL graph as gRPC, gRPC-Web, Connect, and
# HTTP+JSON on a separate port (default 5026). Operation handlers are
# generated by `wgc grpc-service generate` from the SDL + Trusted Documents
# pushed by the synthesis worker (apps/synthesis-worker/cosmo_writer.py),
# and read from the file_system storage provider declared below.
#
# Tutorial: https://github.com/wundergraph/connectrpc-tutorial
# URL shape: http://<host>:5026/<package>.<Service>/<RpcMethod>
# Default proto package per agent is "<agent_name>.v1" (set in cosmo_writer).
connect_rpc:
  enabled: true
  server:
    listen_addr: "0.0.0.0:5026"
  storage:
    provider_id: "fs-services"
  graphql_endpoint: "http://localhost:4000/graphql"

# --- Storage providers --------------------------------------------------
# `fs-services` is consumed by connect_rpc above; it points at the directory
# the synthesis worker writes proto + .graphql operation files into. The
# router watches it and reloads operation handlers on change.
storage_providers:
  file_system:
    - id: "fs-services"
      path: "/etc/cosmo-router/services"

# --- Event-Driven Federated Subscriptions (EDFS) -------------------------
# architecture.md §4 — EDFS Kafka/NATS bindings registered during the
# Dream Query schema_change_proposal_workflow step. Both providers are
# defined so Dream Query can pick per-topic; if EDFS_*_BROKERS / URL are
# unset, the entire `events:` block is omitted at render time (offline-dev
# friendly — empty broker strings fail schema validation). Render at boot
# via the `-override-env` flag or compose env_file.
#
# Uncomment + populate when EDFS providers are reachable:
# events:
#   providers:
#     kafka:
#       - id: "understudy-kafka"
#         brokers:
#           - "${EDFS_KAFKA_BROKERS}"
#         authentication:
#           sasl_plain:
#             username: "${EDFS_KAFKA_SASL_USERNAME}"
#             password: "${EDFS_KAFKA_SASL_PASSWORD}"
#         tls:
#           enabled: true
#     nats:
#       - id: "understudy-nats"
#         url: "${EDFS_NATS_URL}"
#         authentication:
#           token: "${EDFS_NATS_TOKEN}"
