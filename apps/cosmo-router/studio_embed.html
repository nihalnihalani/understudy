<!--
  Cosmo Studio embed fragment for the Understudy dashboard.

  Consumed by apps/ui (task #10, frontend-designer). The outer page is
  responsible for substituting `__STUDIO_URL__` with the value of the
  STUDIO_URL env var exposed via the Next.js config — e.g. in a React
  component:

      const src = process.env.NEXT_PUBLIC_STUDIO_URL
      return <CosmoStudioEmbed src={src} />

  architecture.md §7 "on stage we show the composed supergraph in Cosmo
  Studio". Keep this fragment small so the frontend can drop it into the
  generated-agent dashboard verbatim.
-->
<section class="understudy-cosmo-studio" aria-label="Cosmo Studio — composed supergraph">
  <header class="understudy-cosmo-studio__header">
    <h2>Federated supergraph</h2>
    <p>
      Every generated agent publishes a subgraph; Cosmo Studio renders the
      composed supergraph live.
    </p>
  </header>
  <iframe
    class="understudy-cosmo-studio__frame"
    src="__STUDIO_URL__"
    title="Cosmo Studio — composed supergraph"
    loading="lazy"
    referrerpolicy="no-referrer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    allow="clipboard-read; clipboard-write"
    style="width:100%;height:720px;border:0;border-radius:12px;background:#0b1020;"
  ></iframe>
</section>
