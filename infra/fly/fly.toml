# Fly.io Machine manifest for the Understudy synthesis API (architecture.md §12).
# Generated agents get their own fly.toml rendered per-agent at synthesis time.
app = "understudy-synthesis"
primary_region = "iad"

[build]
  image = "ghcr.io/nihalnihalani/understudy-synthesis-api:latest"

[env]
  PORT = "8080"
  DEMO_MODE = "live"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

