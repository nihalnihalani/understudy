# Understudy release pipeline — SLSA Build Level 2.
#
# Implements architecture.md §6 end-to-end:
#   checkout → buildx → docker build (wolfi-base)
#   → Syft in-process SBOM (build-time, NOT post-scan — §13)
#   → SLSA L2 provenance predicate (slsa-github-generator v2, L2 not L3 — §18)
#   → push to GHCR
#   → cosign keyless sign via Fulcio (id-token: write → OIDC)
#   → cosign attest --type slsaprovenance
#   → Rekor transparency-log UUID read-back
#
# The `certificate-identity` below is the exact string scripts/verify_release.sh
# and the stage-demo verifier expect (README Quickstart step 5).

name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nihalnihalani/understudy-agent-base
  COSIGN_EXPERIMENTAL: "1"
  COSIGN_CERT_IDENTITY: "https://github.com/nihalnihalani/understudy/.github/workflows/release.yml@refs/heads/main"
  COSIGN_CERT_OIDC_ISSUER: "https://token.actions.githubusercontent.com"

jobs:
  build-sign-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image_ref }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.18.1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image reference
        run: |
          image_ref="${REGISTRY}/${IMAGE_NAME}"
          echo "image_ref=${image_ref}" >>"$GITHUB_OUTPUT"
          echo "tag_sha=${image_ref}:${GITHUB_SHA}" >>"$GITHUB_OUTPUT"
          echo "tag_latest=${image_ref}:latest" >>"$GITHUB_OUTPUT"

      - id: build
        name: Build image (Chainguard wolfi-base)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/chainguard/Dockerfile.wolfi
          push: false
          load: true
          sbom: true           # build-time SBOM emitted in-process by BuildKit
          provenance: mode=max # SLSA provenance attestation via BuildKit
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}

      - name: Generate Syft SBOM (spdx-json, build-time in-process)
        run: |
          syft "${{ steps.meta.outputs.tag_sha }}" \
            -o spdx-json=sbom.spdx.json \
            --source-name understudy-agent-base \
            --source-version "${GITHUB_SHA}"
          ls -lah sbom.spdx.json

      - id: push
        name: Push image to GHCR
        run: |
          docker push "${{ steps.meta.outputs.tag_sha }}"
          docker push "${{ steps.meta.outputs.tag_latest }}"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' \
                     "${{ steps.meta.outputs.tag_sha }}" \
                     | cut -d@ -f2)
          echo "digest=${digest}" >>"$GITHUB_OUTPUT"
          echo "image_with_digest=${{ steps.meta.outputs.image_ref }}@${digest}" >>"$GITHUB_OUTPUT"

      - name: Cosign keyless sign (Fulcio → Rekor)
        env:
          IMAGE_WITH_DIGEST: ${{ steps.push.outputs.image_with_digest }}
        run: |
          cosign sign --yes \
            --oidc-issuer "${COSIGN_CERT_OIDC_ISSUER}" \
            "${IMAGE_WITH_DIGEST}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

  slsa-provenance:
    # SLSA L2 generic generator — emits the in-toto provenance predicate for the
    # pushed image digest. L2 (not L3) is intentional; hermetic builder is out
    # of scope for the hackathon (architecture.md §18 risk #5).
    needs: build-sign-push
    permissions:
      id-token: write
      contents: read
      packages: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build-sign-push.outputs.image }}
      digest: ${{ needs.build-sign-push.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  attest-and-verify:
    needs: [build-sign-push, slsa-provenance]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    env:
      IMAGE_WITH_DIGEST: ${{ needs.build-sign-push.outputs.image }}@${{ needs.build-sign-push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install rekor-cli
        run: |
          curl -sSL -o rekor-cli \
            https://github.com/sigstore/rekor/releases/download/v1.3.6/rekor-cli-linux-amd64
          chmod +x rekor-cli
          sudo mv rekor-cli /usr/local/bin/rekor-cli

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ github.sha }}

      - name: Cosign attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_WITH_DIGEST}"

      - name: Cosign attach SLSA provenance attestation
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type slsaprovenance \
            "${IMAGE_WITH_DIGEST}"

      - name: Post-verify Rekor transparency log entry
        run: |
          echo "Looking up Rekor entry for ${IMAGE_WITH_DIGEST}"
          digest="${{ needs.build-sign-push.outputs.digest }}"
          uuid=$(rekor-cli search --sha "${digest#sha256:}" | tail -n1)
          echo "Rekor UUID: ${uuid}"
          rekor-cli get --uuid "${uuid}" >rekor-entry.json
          echo "Transparency log entry recorded."

      - name: Stage-demo verifier (dry run of scripts/verify_release.sh)
        run: |
          chmod +x scripts/verify_release.sh
          scripts/verify_release.sh "${IMAGE_WITH_DIGEST}"
