# Understudy release pipeline — SLSA Build Level 2.
#
# Implements architecture.md §6 end-to-end:
#   checkout → buildx → docker build (wolfi-base)
#   → Syft in-process SBOM (build-time, NOT post-scan — §13)
#   → SLSA L2 provenance predicate (slsa-github-generator v2, L2 not L3 — §18)
#   → push to GHCR
#   → cosign keyless sign via Fulcio (id-token: write → OIDC)
#   → cosign attest --type slsaprovenance
#   → Rekor transparency-log UUID read-back
#
# The `certificate-identity` below is the exact string scripts/verify_release.sh
# and the stage-demo verifier expect (README Quickstart step 5).

name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nihalnihalani/understudy-agent-base
  COSIGN_EXPERIMENTAL: "1"
  COSIGN_CERT_IDENTITY: "https://github.com/nihalnihalani/understudy/.github/workflows/release.yml@refs/heads/main"
  COSIGN_CERT_OIDC_ISSUER: "https://token.actions.githubusercontent.com"

jobs:
  build-sign-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image_ref }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.18.1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image reference
        run: |
          image_ref="${REGISTRY}/${IMAGE_NAME}"
          echo "image_ref=${image_ref}" >>"$GITHUB_OUTPUT"
          echo "tag_sha=${image_ref}:${GITHUB_SHA}" >>"$GITHUB_OUTPUT"
          echo "tag_latest=${image_ref}:latest" >>"$GITHUB_OUTPUT"

      - id: libs
        name: Compute pip index URL (Chainguard Libraries if secrets set)
        # If CHAINGUARD_PYTHON_USERNAME + CHAINGUARD_PYTHON_PASSWORD secrets are
        # present, the image pulls deps from Chainguard's malware-resistant
        # rebuilt-from-source PyPI mirror (docs/chainguard-libraries.md).
        # Otherwise (fork PRs, first-time runs) we fall back to public PyPI with
        # a CI warning — the Dockerfile default works either way.
        env:
          CG_USER: ${{ secrets.CHAINGUARD_PYTHON_USERNAME }}
          CG_PASS: ${{ secrets.CHAINGUARD_PYTHON_PASSWORD }}
        run: |
          if [[ -n "${CG_USER}" && -n "${CG_PASS}" ]]; then
            echo "::add-mask::${CG_PASS}"
            echo "index_url=https://${CG_USER}:${CG_PASS}@libraries.cgr.dev/python/simple" >>"$GITHUB_OUTPUT"
            echo "mode=chainguard-libraries" >>"$GITHUB_OUTPUT"
            echo "Using Chainguard Libraries (malware-resistant rebuilt-from-source PyPI mirror)."
          else
            echo "index_url=https://pypi.org/simple" >>"$GITHUB_OUTPUT"
            echo "mode=public-pypi" >>"$GITHUB_OUTPUT"
            echo "::warning::CHAINGUARD_PYTHON_USERNAME/PASSWORD not set — falling back to public PyPI. See docs/chainguard-libraries.md to enable."
          fi

      - id: build
        name: Build image (Chainguard wolfi-base + Chainguard Libraries)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/chainguard/Dockerfile.wolfi
          push: false
          load: true
          sbom: true           # build-time SBOM emitted in-process by BuildKit
          provenance: mode=max # SLSA provenance attestation via BuildKit
          # build-args are automatically masked when they contain a masked secret.
          build-args: |
            PIP_INDEX_URL=${{ steps.libs.outputs.index_url }}
            PIP_EXTRA_INDEX_URL=https://pypi.org/simple
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}

      - name: Generate Syft SBOM (spdx-json, build-time in-process)
        run: |
          syft "${{ steps.meta.outputs.tag_sha }}" \
            -o spdx-json=sbom.spdx.json \
            --source-name understudy-agent-base \
            --source-version "${GITHUB_SHA}"
          ls -lah sbom.spdx.json

      - id: push
        name: Push image to GHCR
        run: |
          docker push "${{ steps.meta.outputs.tag_sha }}"
          docker push "${{ steps.meta.outputs.tag_latest }}"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' \
                     "${{ steps.meta.outputs.tag_sha }}" \
                     | cut -d@ -f2)
          echo "digest=${digest}" >>"$GITHUB_OUTPUT"
          echo "image_with_digest=${{ steps.meta.outputs.image_ref }}@${digest}" >>"$GITHUB_OUTPUT"

      - name: Cosign keyless sign (Fulcio → Rekor)
        env:
          IMAGE_WITH_DIGEST: ${{ steps.push.outputs.image_with_digest }}
        run: |
          cosign sign --yes \
            --oidc-issuer "${COSIGN_CERT_OIDC_ISSUER}" \
            "${IMAGE_WITH_DIGEST}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

  slsa-provenance:
    # SLSA L2 generic generator — emits the in-toto provenance predicate for the
    # pushed image digest. L2 (not L3) is intentional; hermetic builder is out
    # of scope for the hackathon (architecture.md §18 risk #5). The reusable
    # workflow uploads the predicate as an artifact we pull into attest-and-verify
    # and feed to `cosign attest --type slsaprovenance`.
    needs: build-sign-push
    permissions:
      id-token: write
      contents: read
      packages: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build-sign-push.outputs.image }}
      digest: ${{ needs.build-sign-push.outputs.digest }}
      registry-username: ${{ github.actor }}
      upload-assets: true
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  attest-and-verify:
    needs: [build-sign-push, slsa-provenance]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    env:
      IMAGE_WITH_DIGEST: ${{ needs.build-sign-push.outputs.image }}@${{ needs.build-sign-push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install rekor-cli
        run: |
          curl -sSL -o rekor-cli \
            https://github.com/sigstore/rekor/releases/download/v1.3.6/rekor-cli-linux-amd64
          chmod +x rekor-cli
          sudo mv rekor-cli /usr/local/bin/rekor-cli

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ github.sha }}

      - name: Download SLSA provenance predicate
        # slsa-github-generator uploads the in-toto provenance predicate as a
        # job artifact named "<image>.intoto.jsonl" when `upload-assets: true`.
        uses: actions/download-artifact@v4
        with:
          # Artifact name from slsa-github-generator/generator_container_slsa3.yml.
          pattern: "*.intoto.jsonl"
          path: slsa-provenance/
          merge-multiple: true

      - name: Cosign attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_WITH_DIGEST}"

      - name: Cosign attach SLSA provenance attestation
        # Provenance predicate comes from the slsa-github-generator job, NOT the
        # SBOM. Using the SBOM here would fail `cosign verify-attestation
        # --type slsaprovenance` at boot per §13's preboot gate.
        run: |
          predicate=$(ls slsa-provenance/*.intoto.jsonl | head -n1)
          if [[ -z "${predicate}" ]]; then
            echo "no SLSA provenance predicate found under slsa-provenance/" >&2
            exit 1
          fi
          cosign attest --yes \
            --predicate "${predicate}" \
            --type slsaprovenance \
            "${IMAGE_WITH_DIGEST}"

      - name: Post-verify Rekor transparency log entry
        run: |
          echo "Looking up Rekor entry for ${IMAGE_WITH_DIGEST}"
          digest="${{ needs.build-sign-push.outputs.digest }}"
          uuid=$(rekor-cli search --sha "${digest#sha256:}" | tail -n1)
          echo "Rekor UUID: ${uuid}"
          rekor-cli get --uuid "${uuid}" >rekor-entry.json
          echo "Transparency log entry recorded."

      - name: Stage-demo verifier (dry run of scripts/verify_release.sh)
        run: |
          chmod +x scripts/verify_release.sh
          scripts/verify_release.sh "${IMAGE_WITH_DIGEST}"

      - name: Publish attestation metadata to InsForge
        # Persist the supply-chain receipt (image / SLSA / SBOM) into the
        # InsForge tables landed in 3e8d159 so the frontend renders attestation
        # data CI actually produced (architecture.md §6). This is a secondary
        # persistence path — failures emit ::warning:: but never break CI, since
        # the cosign + Rekor proof above is the canonical record.
        env:
          INSFORGE_URL: ${{ secrets.INSFORGE_URL }}
          INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY }}
          IMAGE_DIGEST: ${{ needs.build-sign-push.outputs.digest }}
          # Full registry path so the `image.registry` column matches what the
          # worker persists (apps/synthesis-worker/main.py:DEFAULT_REGISTRY).
          # Without IMAGE_NAME suffix, CI would write "ghcr.io" and the worker
          # would write "ghcr.io/nihalnihalani/understudy-agent-base", creating
          # first-writer-wins column drift on the same image.digest PK.
          REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -uo pipefail
          if [[ -z "${INSFORGE_URL:-}" || -z "${INSFORGE_API_KEY:-}" ]]; then
            echo "::warning::INSFORGE_URL or INSFORGE_API_KEY not set — skipping attestation persistence. Set both as repo secrets to enable."
            exit 0
          fi

          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PREDICATE="$(ls slsa-provenance/*.intoto.jsonl 2>/dev/null | head -n1 || true)"

          insforge_post() {
            local table="$1"
            local body="$2"
            local code
            code=$(curl -sS -o /tmp/insforge_resp.json -w '%{http_code}' \
              -X POST "${INSFORGE_URL%/}/api/database/records/${table}" \
              -H "Authorization: Bearer ${INSFORGE_API_KEY}" \
              -H "Content-Type: application/json" \
              --data "${body}" || echo "000")
            echo "${code}"
          }

          # 1. image — FK target for the other two rows. 409 = duplicate digest, idempotent.
          image_body=$(jq -cn \
            --arg digest "${IMAGE_DIGEST}" \
            --arg registry "${REGISTRY}" \
            --arg built_at "${BUILT_AT}" \
            '[{digest:$digest, registry:$registry, built_at:$built_at}]')
          image_code=$(insforge_post "image" "${image_body}")
          if [[ "${image_code}" =~ ^2 ]] || [[ "${image_code}" == "409" ]]; then
            echo "image row OK (HTTP ${image_code})"
          else
            echo "::warning::InsForge image insert failed (HTTP ${image_code}): $(cat /tmp/insforge_resp.json 2>/dev/null || true)"
            exit 0
          fi

          # 2. slsa_attestation — extract in-toto materials from the SLSA generator predicate.
          # Both CI and worker write `materials` as a jsonb OBJECT with a
          # `resolved_dependencies` array inside (shape mirrored in
          # apps/synthesis-worker/main.py:_persist_artifacts). The schema column
          # is jsonb DEFAULT '{}'::jsonb — a bare array would satisfy the type
          # but break the worker/UI's dict-shape assumption.
          if [[ -n "${PREDICATE}" && -f "${PREDICATE}" ]]; then
            # .intoto.jsonl is one DSSE envelope per line; payload is base64 in-toto statement.
            deps_array=$(jq -sR '
              split("\n") | map(select(length>0)) | .[0]
              | fromjson
              | .payload
              | @base64d
              | fromjson
              | (.predicate.materials // .predicate.buildDefinition.resolvedDependencies // [])
            ' "${PREDICATE}" 2>/dev/null || echo '[]')
            builder_id=$(jq -sR '
              split("\n") | map(select(length>0)) | .[0]
              | fromjson
              | .payload
              | @base64d
              | fromjson
              | (.predicate.builder.id // .predicate.runDetails.builder.id // "unknown")
            ' "${PREDICATE}" 2>/dev/null || echo '"unknown"')
            predicate_type=$(jq -sR '
              split("\n") | map(select(length>0)) | .[0]
              | fromjson
              | .payload
              | @base64d
              | fromjson
              | (.predicateType // "https://slsa.dev/provenance/v1")
            ' "${PREDICATE}" 2>/dev/null || echo '"https://slsa.dev/provenance/v1"')
          else
            echo "::warning::SLSA predicate not found at slsa-provenance/*.intoto.jsonl — using empty materials."
            deps_array='[]'
            builder_id='"unknown"'
            predicate_type='"https://slsa.dev/provenance/v1"'
          fi

          # Wrap the array in the shared `resolved_dependencies` dict shape.
          materials_json=$(jq -cn \
            --argjson deps "${deps_array}" \
            --arg bt "https://slsa.dev/container-based-build/v0.1" \
            '{resolved_dependencies:$deps, build_type:$bt}')

          slsa_body=$(jq -cn \
            --arg digest "${IMAGE_DIGEST}" \
            --argjson predicate_type "${predicate_type}" \
            --argjson builder_id "${builder_id}" \
            --argjson materials "${materials_json}" \
            '[{image_digest:$digest, predicate_type:$predicate_type, builder_id:$builder_id, materials:$materials}]')
          slsa_code=$(insforge_post "slsa_attestation" "${slsa_body}")
          if [[ "${slsa_code}" =~ ^2 ]]; then
            echo "slsa_attestation row OK (HTTP ${slsa_code})"
          else
            echo "::warning::InsForge slsa_attestation insert failed (HTTP ${slsa_code}): $(cat /tmp/insforge_resp.json 2>/dev/null || true)"
          fi

          # 3. sbom — components array from the spdx-json document.
          if [[ -f sbom.spdx.json ]]; then
            components_json=$(jq -c '.packages // []' sbom.spdx.json)
          else
            echo "::warning::sbom.spdx.json not present — using empty components."
            components_json='[]'
          fi
          sbom_body=$(jq -cn \
            --arg digest "${IMAGE_DIGEST}" \
            --arg format "spdx-json" \
            --arg gen_time "${BUILT_AT}" \
            --argjson components "${components_json}" \
            '[{image_digest:$digest, format:$format, generation_time:$gen_time, components:$components}]')
          sbom_code=$(insforge_post "sbom" "${sbom_body}")
          if [[ "${sbom_code}" =~ ^2 ]]; then
            echo "sbom row OK (HTTP ${sbom_code})"
          else
            echo "::warning::InsForge sbom insert failed (HTTP ${sbom_code}): $(cat /tmp/insforge_resp.json 2>/dev/null || true)"
          fi
